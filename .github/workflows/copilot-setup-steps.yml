name: Copilot Setup Steps

# Required by GitHub Copilot cloud agent to install MCP server dependencies
# before the coding agent session starts.
# See: https://docs.github.com/en/copilot/how-tos/use-copilot-agents/coding-agent/extend-coding-agent-with-mcp

on:
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install MCP server dependencies
        run: pip install gitpython mcp
