# SQL Injection Scanner - Reusable Pipeline Template
# 
# This template can be referenced by any Azure DevOps project to enable
# automated SQL injection scanning without copying scanner code.
#
# Usage in your project's pipeline:
#   resources:
#     repositories:
#       - repository: playbook
#         type: git
#         name: Vancity/IS.Copilot.Playbook
#   
#   extends:
#     template: .github/shared/skills/sql-injection-scanner/pipeline-template.yml@playbook

parameters:
  - name: pythonVersion
    type: string
    default: '3.12'
    displayName: 'Python version to use'
  
  - name: scanPath
    type: string
    default: '$(Build.SourcesDirectory)'
    displayName: 'Path to scan (default: entire repository)'
  
  - name: failOnFindings
    type: boolean
    default: true
    displayName: 'Fail build if vulnerabilities found'
  
  - name: generateReport
    type: boolean
    default: true
    displayName: 'Generate HTML test report'

stages:
  - stage: SQLInjectionScan
    displayName: 'SQL Injection Security Scan'
    jobs:
      - job: ScanCode
        displayName: 'Scan for SQL Injection Vulnerabilities'
        pool:
          vmImage: 'ubuntu-latest'
        
        steps:
          - checkout: self
            displayName: 'Checkout Project Code'
          
          - checkout: playbook
            displayName: 'Checkout Scanner Tools'
          
          - task: UsePythonVersion@0
            displayName: 'Set Python ${{ parameters.pythonVersion }}'
            inputs:
              versionSpec: '${{ parameters.pythonVersion }}'
              addToPath: true
          
          - script: |
              python -m pip install --upgrade pip
              pip install -r $(Build.SourcesDirectory)/IS.Copilot.Playbook/.github/shared/skills/sql-injection-scanner/requirements.txt
            displayName: 'Install Scanner Dependencies'
          
          - script: |
              cd $(Build.SourcesDirectory)/IS.Copilot.Playbook/.github/shared/skills/sql-injection-scanner
              python cli.py scan-dir ${{ parameters.scanPath }} --json > $(Build.ArtifactStagingDirectory)/scan-results.json
            displayName: 'Run SQL Injection Scan'
            continueOnError: true
          
          - script: |
              cd $(Build.SourcesDirectory)/IS.Copilot.Playbook/.github/shared/skills/sql-injection-scanner
              python -c "
              import json
              import sys
              with open('$(Build.ArtifactStagingDirectory)/scan-results.json', 'r') as f:
                  result = json.load(f)
                  total = result.get('total_findings', 0)
                  print(f'Found {total} SQL injection vulnerabilities')
                  if total > 0 and ${{ parameters.failOnFindings }}:
                      print('##vso[task.logissue type=error]SQL injection vulnerabilities detected!')
                      sys.exit(1)
              "
            displayName: 'Validate Scan Results'
          
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Scan Results'
            condition: succeededOrFailed()
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)/scan-results.json'
              artifactName: 'SQLInjectionScanResults'
              publishLocation: 'Container'
          
          - ${{ if eq(parameters.generateReport, true) }}:
            - script: |
                cd $(Build.SourcesDirectory)/IS.Copilot.Playbook/.github/shared/skills/sql-injection-scanner
                python run_tests.py --report $(Build.ArtifactStagingDirectory)/test-report.html
              displayName: 'Generate Test Report'
              condition: succeededOrFailed()
            
            - task: PublishBuildArtifacts@1
              displayName: 'Publish Test Report'
              condition: succeededOrFailed()
              inputs:
                pathToPublish: '$(Build.ArtifactStagingDirectory)/test-report.html'
                artifactName: 'TestReport'
                publishLocation: 'Container'
