# Azure DevOps Pipeline for SQL Injection Scanner
# This pipeline runs automated tests on every commit and pull request

trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
  paths:
    include:
      - .github/shared/skills/sql-injection-scanner/**

pr:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - .github/shared/skills/sql-injection-scanner/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  pythonVersion: '3.12'
  workingDirectory: '.github/shared/skills/sql-injection-scanner'

stages:
  - stage: Test
    displayName: 'Run Tests'
    jobs:
      - job: UnitTests
        displayName: 'Unit Tests'
        steps:
          - task: UsePythonVersion@0
            displayName: 'Set Python $(pythonVersion)'
            inputs:
              versionSpec: '$(pythonVersion)'
              addToPath: true

          - script: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt
            displayName: 'Install Dependencies'
            workingDirectory: '$(workingDirectory)'

          - script: |
              python run_tests.py --verbose --report test-report.html
            displayName: 'Run Test Suite'
            workingDirectory: '$(workingDirectory)'

          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: '**/test-results.xml'
              searchFolder: '$(workingDirectory)'
              mergeTestResults: true
              failTaskOnFailedTests: true
              testRunTitle: 'SQL Injection Scanner Tests'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish HTML Report'
            condition: succeededOrFailed()
            inputs:
              pathToPublish: '$(workingDirectory)/test-report.html'
              artifactName: 'TestReport'
              publishLocation: 'Container'

  - stage: Validate
    displayName: 'Validate Skill'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: ValidateSkill
        displayName: 'Validate SKILL.md'
        steps:
          - task: UsePythonVersion@0
            displayName: 'Set Python $(pythonVersion)'
            inputs:
              versionSpec: '$(pythonVersion)'
              addToPath: true

          - script: |
              python tools/skill-creator/scripts/quick_validate.py .github/shared/skills/sql-injection-scanner/SKILL.md
            displayName: 'Validate SKILL.md Schema'
            workingDirectory: '$(Build.SourcesDirectory)'

  - stage: SecurityScan
    displayName: 'Security Scan'
    dependsOn: Test
    condition: succeeded()
    jobs:
      - job: BanditScan
        displayName: 'Bandit Security Scan'
        steps:
          - task: UsePythonVersion@0
            displayName: 'Set Python $(pythonVersion)'
            inputs:
              versionSpec: '$(pythonVersion)'
              addToPath: true

          - script: |
              pip install bandit
              bandit -r . -f json -o bandit-report.json || true
            displayName: 'Run Bandit Security Scan'
            workingDirectory: '$(workingDirectory)'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Bandit Report'
            condition: succeededOrFailed()
            inputs:
              pathToPublish: '$(workingDirectory)/bandit-report.json'
              artifactName: 'BanditReport'
              publishLocation: 'Container'

  - stage: Package
    displayName: 'Package Skill'
    dependsOn:
      - Test
      - Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: PackageSkill
        displayName: 'Create Skill Package'
        steps:
          - task: UsePythonVersion@0
            displayName: 'Set Python $(pythonVersion)'
            inputs:
              versionSpec: '$(pythonVersion)'
              addToPath: true

          - script: |
              python tools/skill-creator/scripts/package_skill.py .github/shared/skills/sql-injection-scanner
            displayName: 'Package Skill'
            workingDirectory: '$(Build.SourcesDirectory)'

          - task: PublishBuildArtifacts@1
            displayName: 'Publish Skill Package'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: 'SkillPackage'
              publishLocation: 'Container'
